<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard da Calculadora</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 15px; }
        
        /* Estilização da Chave Seletora de Modo */
        .mode-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            padding: 8px;
            border-radius: 20px;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: bold;
        }
        .mode-label {
            margin: 0 10px;
            color: #666;
            transition: color 0.3s;
        }
        .mode-label.active {
            color: #2b7a78;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2b7a78;
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* Estilos do Formulário */
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            font-size: 16px;
            text-align: center;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        button {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            font-size: 14px;
        }
        .btn-soma { background-color: #2b7a78; }
        .btn-sub { background-color: #3aafa9; }
        button:hover { opacity: 0.9; }
        
        /* Containers de Mensagem */
        #resultado-container {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            text-align: left;
        }
        .op-text {
            font-size: 13px;
            border-bottom: 1px dashed rgba(0,0,0,0.15);
            padding-bottom: 4px;
            margin-bottom: 6px;
            font-weight: normal;
        }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-overflow { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard</h2>

    <div class="mode-selector">
        <span id="label-esp" class="mode-label active">ESP32</span>
        <label class="switch">
            <input type="checkbox" id="mode-toggle" onchange="atualizarInterfaceModo()">
            <span class="slider"></span>
        </label>
        <span id="label-teste" class="mode-label">TEST</span>
    </div>
    
    <div class="form-group">
        <label for="opA">Operando A (4 bits):</label>
        <input type="text" id="opA" placeholder="Ex: 0110" maxlength="4" value="0110" oninput="aplicarMascaraBinaria(this)">
    </div>
    
    <div class="form-group">
        <label for="opB">Operando B (4 bits):</label>
        <input type="text" id="opB" placeholder="Ex: 0010" maxlength="4" value="0010" oninput="aplicarMascaraBinaria(this)">
    </div>
    
    <div class="buttons">
        <button class="btn-soma" onclick="enviarRequisicao('add')">SOMA</button>
        <button class="btn-sub" onclick="enviarRequisicao('sub')">SUB</button>
    </div>

    <div id="resultado-container"></div>
</div>

<script>
    const ESP32_IP = "http://192.168.4.1";

    function aplicarMascaraBinaria(input) {
        input.value = input.value.replace(/[^01]/g, '');
    }

    function atualizarInterfaceModo() {
        const isModoTeste = document.getElementById('mode-toggle').checked;
        document.getElementById('label-esp').className = isModoTeste ? "mode-label" : "mode-label active";
        document.getElementById('label-teste').className = isModoTeste ? "mode-label active" : "mode-label";
        document.getElementById('resultado-container').style.display = "none";
    }

    function enviarRequisicao(operacao) {
        const a = document.getElementById('opA').value.trim();
        const b = document.getElementById('opB').value.trim();
        const resContainer = document.getElementById('resultado-container');
        const isModoTeste = document.getElementById('mode-toggle').checked;

        if (a.length !== 4 || b.length !== 4) {
            resContainer.className = "alert-overflow";
            resContainer.innerHTML = "Erro: Ambos os operandos precisam ter exatamente 4 bits.";
            resContainer.style.display = "block";
            return;
        }

        if (isModoTeste) {
            const converterParaInteiro4Bits = (bin) => {
                let n = parseInt(bin, 2);
                return (n & 0x08) ? (n - 16) : n; 
            };

            const valA = converterParaInteiro4Bits(a);
            const valB = converterParaInteiro4Bits(b);
            
            let contaPura = (operacao === 'add') ? (valA + valB) : (valA - valB);
            
            let result4Bits = contaPura & 0x0F;
            if (result4Bits & 0x08) {
                result4Bits -= 16;
            }

            let overflow = false;
            if (operacao === 'add') {
                if ((valA > 0 && valB > 0 && result4Bits <= 0) || 
                    (valA < 0 && valB < 0 && result4Bits >= 0)) {
                    overflow = true;
                }
            } else {
                if ((valA >= 0 && valB < 0 && result4Bits < 0) || 
                    (valA < 0 && valB > 0 && result4Bits > 0)) {
                    overflow = true;
                }
            }

            let resultadoBinario = (contaPura & 0x0F).toString(2).padStart(4, '0');
            
            // Simula o formato de string gerado dinamicamente pelo firmware do ESP32
            let operacaoSimulada = (operacao === 'add') ? `( ${valA} ) + ( ${valB} )` : `( ${valA} ) - ( ${valB} )`;

            resContainer.style.display = "block";
            if (overflow) {
                resContainer.className = "alert-overflow";
                resContainer.innerHTML = `<div class="op-text"><b>Operação:</b> ${operacaoSimulada}</div>
                                          [TESTE] Overflow! <br> Resultado Bruto: ${resultadoBinario}`;
            } else {
                resContainer.className = "alert-success";
                resContainer.innerHTML = `<div class="op-text"><b>Operação:</b> ${operacaoSimulada}</div>
                                          [TESTE] Sucesso! <br> Resultado Mascarado: ${resultadoBinario}`;
            }
            return; 
        }
        
        // MODO HTTP
        const url = `${ESP32_IP}/calc?a=${a}&b=${b}&op=${operacao}`;

        fetch(url)
            .then(response => {
                if (!response.ok) throw new Error("Erro na resposta do servidor");
                return response.json();
            })
            .then(data => {
                resContainer.style.display = "block";
                
                // Exibe a operação limpa vinda do JSON (ex: "5 - -8") juntamente com a análise de overflow
                if (data.overflow) {
                    resContainer.className = "alert-overflow";
                    resContainer.innerHTML = `<div class="op-text"><b>Operação:</b> ${data.operacao}</div>
                                              Overflow! <br> Resultado Bruto: ${data.resultado_bin}`;
                } else {
                    resContainer.className = "alert-success";
                    resContainer.innerHTML = `<div class="op-text"><b>Operação:</b> ${data.operacao}</div>
                                              Sucesso! <br> Resultado Mascarado: ${data.resultado_bin}`;
                }
            })
            .catch(error => {
                resContainer.className = "alert-overflow";
                resContainer.innerHTML = "Erro de conexão com o ESP32.";
                resContainer.style.display = "block";
                console.error(error);
            });
    }
</script>

</body>
</html>
